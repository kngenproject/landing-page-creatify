<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#b89a6a">
<title>Dashboard — Creatify</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #f5f0e8;
    --blue:    #b89a6a;
    --blue-lt: #ede6d6;
    --sky:     #d4b896;
    --sky-lt:  #f2ede3;
    --deep:    #6b4f2e;
    --text:    #2c2118;
    --muted:   #9a8570;
    --white:   #fdfaf5;
    --card-shadow: 0 4px 24px rgba(120,90,50,0.10), 0 1px 4px rgba(120,90,50,0.06);
  }

  body {
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
  }

  /* Background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 400px; height: 400px;
    top: -100px; right: -80px;
    background: radial-gradient(circle, #d4b89655, transparent 70%);
  }
  body::after {
    width: 300px; height: 300px;
    bottom: -80px; left: -60px;
    background: radial-gradient(circle, #c9a87855, transparent 70%);
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }

  /* ══════════════════════════════════════ */
  /* HEADER */
  /* ══════════════════════════════════════ */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 10px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .brand-logo {
    width: 34px;
    height: 34px;
    background: linear-gradient(135deg, var(--blue), var(--sky));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    box-shadow: 0 2px 8px rgba(180,140,90,0.3);
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .logout-btn {
    background: none;
    border: 1.5px solid #ddd0b8;
    border-radius: 100px;
    padding: 6px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }
  .logout-btn:hover {
    border-color: var(--blue);
    color: var(--deep);
    background: var(--blue-lt);
  }

  /* ══════════════════════════════════════ */
  /* GREETING */
  /* ══════════════════════════════════════ */
  .greeting {
    padding: 24px 0 20px;
    opacity: 0;
    animation: slideUp 0.6s 0.1s ease forwards;
  }

  .greeting-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }

  .greeting-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 7vw, 34px);
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .greeting-name em {
    font-style: italic;
    background: linear-gradient(135deg, var(--blue), var(--sky));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ══════════════════════════════════════ */
  /* SECTION LABEL */
  /* ══════════════════════════════════════ */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #ddd0b8;
  }

  /* ══════════════════════════════════════ */
  /* APP GRID */
  /* ══════════════════════════════════════ */
  .app-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .app-tile {
    background: var(--white);
    border-radius: 20px;
    padding: 20px 18px 18px;
    border: 1px solid #ddd0b8;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none;
    display: block;
    opacity: 0;
    animation: slideUp 0.5s ease forwards;
    position: relative;
    overflow: hidden;
  }
  .app-tile::before {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 70px; height: 70px;
    border-radius: 50%;
    opacity: 0.07;
    transition: opacity 0.25s;
  }
  .app-tile:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(120,90,50,0.16);
    border-color: var(--blue);
  }
  .app-tile:hover::before {
    opacity: 0.14;
  }
  .app-tile:active {
    transform: scale(0.97);
  }

  .tile-icon {
    font-size: 28px;
    display: block;
    margin-bottom: 10px;
    line-height: 1;
  }

  .tile-name {
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.2;
  }

  .tile-desc {
    font-size: 10.5px;
    color: var(--muted);
    line-height: 1.4;
    font-weight: 400;
  }

  .tile-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 100px;
    margin-top: 8px;
    background: var(--blue-lt);
    color: var(--deep);
    border: 1px solid #c9aa82;
  }

  /* ══════════════════════════════════════ */
  /* ⬇⬇⬇  TAMBAH APP BARU DI SINI  ⬇⬇⬇  */
  /* Warna aksen tiap tile (opsional)       */
  /* ══════════════════════════════════════ */
  .app-tile[data-app="tamma"]::before    { background: #b89a6a; }
  .app-tile[data-app="voteku"]::before   { background: #8c6b9e; }
  .app-tile[data-app="cbt"]::before      { background: #6b8c5c; }
  .app-tile[data-app="absensi"]::before  { background: #5c7a8c; }

  /* ══════════════════════════════════════ */
  /* FOOTER */
  /* ══════════════════════════════════════ */
  .footer {
    font-size: 10px;
    color: #b8a080;
    text-align: center;
    letter-spacing: 0.06em;
    padding-top: 10px;
  }

  /* ══════════════════════════════════════ */
  /* LOADING STATE */
  /* ══════════════════════════════════════ */
  .loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.3s ease;
  }
  .loading-spinner {
    width: 28px; height: 28px;
    border: 3px solid #ddd0b8;
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Stagger animasi tiles */
  .app-tile:nth-child(1) { animation-delay: 0.15s; }
  .app-tile:nth-child(2) { animation-delay: 0.22s; }
  .app-tile:nth-child(3) { animation-delay: 0.29s; }
  .app-tile:nth-child(4) { animation-delay: 0.36s; }
  .app-tile:nth-child(5) { animation-delay: 0.43s; }
  .app-tile:nth-child(6) { animation-delay: 0.50s; }
</style>
</head>
<body>

<!-- Loading screen (hilang setelah auth check) -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
</div>

<div class="page" id="mainContent" style="display:none;">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="brand-logo">✦</div>
      <span class="brand-name">Creatify</span>
    </div>
    <button class="logout-btn" onclick="handleLogout()">Keluar</button>
  </div>

  <!-- GREETING -->
  <div class="greeting">
    <div class="greeting-sub">Selamat datang,</div>
    <div class="greeting-name" id="greetingName">Memuat<em>...</em></div>
  </div>

  <!-- APP LIST -->
  <div class="section-label">Pilih Aplikasi</div>

  <div class="app-grid" id="appGrid">

    <!-- ════════════════════════════════════════════════════
         ✏️  TEMPLATE TILE — DUPLIKAT BLOK INI UNTUK TAMBAH APP
         
         Ganti:
           data-app   = id unik app (bebas, untuk styling)
           href       = path / URL tujuan app kamu
           tile-icon  = emoji atau karakter
           tile-name  = nama app
           tile-desc  = deskripsi singkat
           tile-badge = label kecil (opsional, hapus kalau tidak perlu)
         ════════════════════════════════════════════════════ -->

    <a class="app-tile" data-app="tamma" href="https://tahfidh-dan-absensi.web.app/">
      <span class="tile-icon">📖</span>
      <div class="tile-name">Tamma</div>
      <div class="tile-desc">Tahfidh & Absensi siswa</div>
      <span class="tile-badge">Aktif</span>
    </a>

    <a class="app-tile" data-app="voteku" href="https://kngenproject.github.io/voting-massal/">
      <span class="tile-icon">🗳️</span>
      <div class="tile-name">Voteku</div>
      <div class="tile-desc">Vote massal cepat & mudah</div>
      <span class="tile-badge">Aktif</span>
    </a>

    <a class="app-tile" data-app="cbt" href="https://cbt-sekolah-568d8.web.app/">
      <span class="tile-icon">📝</span>
      <div class="tile-name">CBT Pro</div>
      <div class="tile-desc">Ujian berbasis komputer</div>
      <span class="tile-badge">Aktif</span>
    </a>

    <a class="app-tile" data-app="absensi" href="https://kngenproject.github.io/Absen-Siswa-QR/">
      <span class="tile-icon">📷</span>
      <div class="tile-name">AbsensiQR</div>
      <div class="tile-desc">Absensi siswa via QR Code</div>
      <span class="tile-badge">Aktif</span>
    </a>

  </div>

  <div class="footer">© 2026 Creatify · Karya digital untuk momen yang berarti</div>
</div>

<script type="module">
  // ═══════════════════════════════════════════════════════════
  // 🔧 FIREBASE CONFIG — Samakan dengan index.html utama
  // ═══════════════════════════════════════════════════════════
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDSiWxxT-qgM_tStgaw7D8AuNaDgI3mkcY",
    authDomain:        "landing-page-creatify.firebaseapp.com",
    projectId:         "landing-page-creatify",
    storageBucket:     "landing-page-creatify.firebasestorage.app",
    messagingSenderId: "142614580975",
    appId:             "1:142614580975:web:368ba820dbfc5f69ca151a"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // ═══════════════════════════════════════════════════════════
  // AUTH GUARD — Kalau belum login, balik ke landing page
  // ═══════════════════════════════════════════════════════════
  onAuthStateChanged(auth, (user) => {
    const loading = document.getElementById('loadingScreen');
    const content = document.getElementById('mainContent');

    if (!user) {
      // Belum login → redirect ke landing page tab App
      window.location.href = '/#app';
      return;
    }

    // Tampilkan nama user (pakai displayName, fallback ke email)
    const nameEl = document.getElementById('greetingName');
    const name   = user.displayName || user.email.split('@')[0];
    nameEl.innerHTML = `${name}<em> ✦</em>`;

    // Sembunyikan loading, tampilkan konten
    loading.style.opacity = '0';
    setTimeout(() => {
      loading.style.display = 'none';
      content.style.display = 'block';
    }, 300);
  });

  // ═══════════════════════════════════════════════════════════
  // LOGOUT
  // ═══════════════════════════════════════════════════════════
  window.handleLogout = async function() {
    try {
      await signOut(auth);
      window.location.href = '/';
    } catch (err) {
      console.error('Logout error:', err);
    }
  };
</script>

</body>
</html>
