<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="description" content="Creatify App - Login ke aplikasi kelola undangan digital">
<meta name="theme-color" content="#b89a6a">
<title>Creatify App - Login</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg:       #f5f0e8;
    --gold:     #b89a6a;
    --gold-lt:  #ede6d6;
    --sand:     #d4b896;
    --sand-lt:  #f2ede3;
    --brown:    #6b4f2e;
    --text:     #2c2118;
    --muted:    #9a8570;
    --white:    #fdfaf5;
    --error:    #e07474;
    --success:  #6b8c5c;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--bg) 0%, #e8e0d4 100%);
    font-family: 'Nunito', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }

  /* Background decorative blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 400px;
    height: 400px;
    top: -100px;
    right: -100px;
    background: radial-gradient(circle, #d4b89680, transparent 70%);
  }
  body::after {
    width: 350px;
    height: 350px;
    bottom: -80px;
    left: -80px;
    background: radial-gradient(circle, #c9a87880, transparent 70%);
  }

  /* Login Container */
  .login-container {
    max-width: 420px;
    width: 100%;
    position: relative;
    z-index: 1;
    animation: fadeInUp 0.5s ease;
  }

  /* Header */
  .app-header {
    text-align: center;
    margin-bottom: 24px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--gold-lt);
    border: 1.5px solid #c9aa82;
    padding: 6px 20px;
    border-radius: 100px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--brown);
    margin-bottom: 20px;
  }
  .logo::before, .logo::after { 
    content: '✦'; 
    font-size: 8px; 
    color: var(--gold); 
  }

  .app-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 600;
    color: var(--text);
  }
  .app-header h1 span {
    background: linear-gradient(135deg, var(--gold), var(--sand));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .app-header p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 8px;
  }

  /* Login Card */
  .login-card {
    background: var(--white);
    border-radius: 32px;
    padding: 40px 32px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.05);
    border: 1px solid #ddd0b8;
  }

  .login-icon {
    text-align: center;
    font-size: 56px;
    margin-bottom: 16px;
  }

  .login-card h2 {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }

  .login-sub {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .input-group {
    margin-bottom: 20px;
  }

  .input-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--brown);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .input-group input {
    width: 100%;
    padding: 14px 18px;
    border: 1.5px solid #e0d4c4;
    border-radius: 60px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    background: var(--white);
    transition: all 0.2s ease;
    outline: none;
  }

  .input-group input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184, 154, 106, 0.2);
  }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold), var(--sand));
    color: white;
    border: none;
    border-radius: 60px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    margin-top: 8px;
    margin-bottom: 20px;
  }

  .login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(150, 110, 60, 0.3);
  }

  .register-link {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .register-link a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
  }

  .register-link a:hover {
    text-decoration: underline;
  }

  .demo-info {
    background: var(--sand-lt);
    border-radius: 20px;
    padding: 16px;
    text-align: center;
    border: 1px solid #d4bc98;
  }

  .demo-info p {
    font-size: 12px;
    color: var(--brown);
    margin-bottom: 10px;
  }

  .demo-info code {
    background: var(--white);
    padding: 6px 12px;
    border-radius: 30px;
    font-size: 11px;
    font-family: monospace;
    color: var(--gold);
    display: inline-block;
    margin: 0 4px;
  }

  .back-home {
    text-align: center;
    margin-top: 24px;
  }

  .back-home a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s;
  }

  .back-home a:hover {
    color: var(--gold);
  }

  /* Animations */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateX(-50%) translateY(-20px);
    }
    to {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .login-card {
      padding: 32px 24px;
    }
    .app-header h1 {
      font-size: 38px;
    }
  }
</style>
</head>
<body>

<div class="login-container">
  <!-- Header -->
  <div class="app-header">
    <div class="logo">Creatify Studio</div>
    <h1>Creat<span>ify</span> App</h1>
    <p>Kelola undangan digital dalam satu aplikasi</p>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h2>Masuk ke Akun</h2>
    <p class="login-sub">Akses dashboard & kelola undanganmu</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label>📧 Email</label>
        <input type="email" id="email" placeholder="nama@email.com" required value="demo@creatify.com">
      </div>
      <div class="input-group">
        <label>🔒 Password</label>
        <input type="password" id="password" placeholder="********" required value="demo123">
      </div>
      <button type="submit" class="login-btn">Masuk ke Dashboard</button>
    </form>

    <div class="register-link">
      Belum punya akun? <a href="#" onclick="showRegister()">Daftar Sekarang</a>
    </div>

    <div class="demo-info">
      <p>✨ Demo Mode ✨</p>
      <p>Gunakan credentials berikut:</p>
      <div>
        <code>demo@creatify.com</code>
        <code>demo123</code>
      </div>
    </div>
  </div>

  <div class="back-home">
    <a href="javascript:void(0)" onclick="goBackToHome()">
      ← Kembali ke Beranda
    </a>
  </div>
</div>

<script>
  /**
   * CREATIFY APP - HALAMAN LOGIN
   * Halaman ini akan muncul ketika mengklik tab App
   */

  // Konfigurasi
  const APP_URL = window.location.origin + window.location.pathname.replace('/app-login.html', '/index.html');
  
  // Handle Login
  function handleLogin(event) {
    event.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    // Demo credentials check
    if (email === 'demo@creatify.com' && password === 'demo123') {
      // Simpan data login
      localStorage.setItem('creatify_user', JSON.stringify({
        email: email,
        name: 'Demo User',
        isLoggedIn: true,
        loginTime: new Date().toISOString()
      }));
      
      showNotification('✅ Login berhasil! Mengarahkan ke dashboard...', 'success');
      
      // Redirect ke dashboard setelah login
      setTimeout(() => {
        window.location.href = 'app-dashboard.html';
      }, 1000);
    } else {
      showNotification('❌ Email atau password salah. Coba lagi!', 'error');
    }
  }
  
  // Show Register (demo)
  function showRegister() {
    showNotification('📝 Fitur registrasi akan segera hadir! Gunakan demo credentials untuk mencoba.', 'info');
  }
  
  // Kembali ke halaman utama
  function goBackToHome() {
    window.location.href = 'index.html';
  }
  
  // Notification System
  function showNotification(message, type = 'info') {
    // Hapus notifikasi lama jika ada
    const oldNotif = document.querySelector('.notification');
    if (oldNotif) oldNotif.remove();
    
    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    notification.textContent = message;
    notification.style.cssText = `
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 60px;
      font-size: 13px;
      font-weight: 500;
      z-index: 1000;
      animation: slideDown 0.3s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      white-space: nowrap;
      background: ${type === 'success' ? 'linear-gradient(135deg, #6b8c5c, #8baa7a)' : type === 'error' ? 'linear-gradient(135deg, #e07474, #c95a5a)' : 'linear-gradient(135deg, var(--brown), #8b6946)'};
      color: white;
    `;
    
    document.body.appendChild(notification);
    
    setTimeout(() => {
      notification.style.opacity = '0';
      notification.style.transition = 'opacity 0.3s ease';
      setTimeout(() => notification.remove(), 300);
    }, 2500);
  }
  
  // Check if already logged in
  document.addEventListener('DOMContentLoaded', function() {
    console.log('Creatify App - Halaman Login');
    console.log('📍 Path: /app-login.html');
    console.log('🔐 Gunakan demo@creatify.com / demo123 untuk login');
    
    // Cek apakah sudah login sebelumnya
    const savedUser = localStorage.getItem('creatify_user');
    if (savedUser) {
      const user = JSON.parse(savedUser);
      if (user.isLoggedIn) {
        // Jika sudah login, redirect ke dashboard
        window.location.href = 'app-dashboard.html';
      }
    }
  });
</script>

</body>
</html>
